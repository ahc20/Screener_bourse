<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAC 40 — Screener OBV</title>
<style>
:root { color-scheme: light; --bg:#FAFAF7; --surface:#FFFFFF; --border:#E5E4DE; --text:#1a1a1a; --muted:#6B6B66; --green:#1d9e75; --green-bg:#E1F5EE; --green-d:#0F6E56; --red:#E24B4A; --red-bg:#FCEBEB; --red-d:#A32D2D; --amber:#BA7517; --amber-bg:#FAEEDA; --amber-d:#854F0B; --blue:#185FA5; --blue-bg:#E6F1FB; --purple:#534AB7; --teal:#0F6E56; --pink:#993556; }
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:16px 20px;font-size:14px}
header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px}
h1{font-size:20px;font-weight:500;margin:0}
.disclaimer{font-size:11px;color:var(--muted);max-width:680px;line-height:1.5}
.disclaimer strong{color:var(--text);font-weight:500}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filters select,.filters input{font:inherit;font-size:13px;padding:7px 10px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none}
.filters input{flex:1;min-width:200px}
.filters select:hover,.filters input:hover{border-color:#C0BEB8}
.filters input:focus,.filters select:focus{border-color:var(--blue)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:18px}
.tile{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px}
.tile .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.tile .v{font-size:22px;font-weight:500;margin-top:2px}
.tile.buy .v{color:var(--green-d)}
.tile.hold .v{color:var(--amber-d)}
.tile.sell .v{color:var(--red-d)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:border-color 0.15s,transform 0.15s,box-shadow 0.15s}
.card:hover{border-color:#A8A6A0;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,0.04)}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:500;flex-shrink:0;letter-spacing:-0.3px}
.card-h .meta{flex:1;min-width:0}
.card-h .nm{font-size:14px;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-h .sec{font-size:11px;color:var(--muted);margin-top:2px}
.card-pr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.card-pr .p{font-size:16px;font-weight:500}
.card-pr .ch{font-size:12px;font-weight:500}
.up{color:var(--green-d)}
.dn{color:var(--red-d)}
.spark{width:100%;height:32px;display:block;margin:4px 0 6px}
.signal{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.3px}
.signal.buy{background:var(--green-bg);color:var(--green-d)}
.signal.hold{background:var(--amber-bg);color:var(--amber-d)}
.signal.sell{background:var(--red-bg);color:var(--red-d)}
.dot{width:6px;height:6px;border-radius:50%}
.dot.buy{background:var(--green-d)}
.dot.hold{background:var(--amber-d)}
.dot.sell{background:var(--red-d)}
.signal-rsi{font-size:10px;color:var(--muted);margin-left:8px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;z-index:100;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(740px,100vw);background:var(--bg);transform:translateX(100%);transition:transform 0.25s;z-index:101;overflow-y:auto;padding:18px 22px}
.panel.open{transform:translateX(0)}
.panel-h{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.panel-h .logo{width:54px;height:54px;font-size:15px}
.panel-h h2{margin:0;font-size:18px;font-weight:500}
.panel-h .sec{font-size:12px;color:var(--muted);margin-top:2px}
.panel-h .pr{margin-left:auto;text-align:right}
.panel-h .pr .p{font-size:22px;font-weight:500;display:block}
.panel-h .pr .ch{font-size:13px;font-weight:500}
.close{border:0;background:transparent;font-size:22px;cursor:pointer;color:var(--muted);padding:6px 10px;border-radius:6px;line-height:1}
.close:hover{background:var(--border);color:var(--text)}
.tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:14px}
.tab{background:transparent;border:0;padding:9px 16px;font:inherit;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.section{display:none}
.section.active{display:block}

.illus{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;margin-bottom:14px}
.illus .icon-wrap{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.illus svg{width:32px;height:32px}
.illus .txt .pn{font-size:13px;font-weight:500}
.illus .txt .pd{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px}
.kpi .v{font-size:18px;font-weight:500;margin-top:3px}
.kpi .x{font-size:10px;color:var(--muted);margin-top:1px}

.bullets{list-style:none;padding:0;margin:0 0 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.bullets li{display:flex;gap:14px;padding:13px 16px;border-bottom:0.5px solid var(--border);align-items:flex-start}
.bullets li:last-child{border-bottom:0}
.bullets .lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;width:118px;padding-top:3px}
.bullets .lbl.nar{color:var(--blue)}
.bullets .lbl.mom{color:var(--green-d)}
.bullets .lbl.pri{color:var(--purple)}
.bullets .lbl.ris{color:var(--red-d)}
.bullets .lbl.cat{color:var(--amber-d)}
.bullets .lbl.ret{color:var(--pink)}
.bullets li.ret{background:#FBEAF0}
.bullets .txt{font-size:13px;line-height:1.6;color:var(--text);flex:1}

.note{font-size:13px;color:var(--text);line-height:1.6;padding:12px 14px;background:var(--blue-bg);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;margin-bottom:14px}
.note.tech{background:#EEEDFE;border-left-color:var(--purple)}
.note.warn{background:var(--amber-bg);border-left-color:var(--amber)}
.note .lbl{font-size:11px;font-weight:500;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:block}
.note.tech .lbl{color:var(--purple)}
.note.warn .lbl{color:var(--amber-d)}

.tech-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:6px;font-weight:500;background:var(--surface);border:0.5px solid var(--border)}
.tag .l{color:var(--muted);font-weight:400}
.tag.up{background:var(--green-bg);color:var(--green-d);border-color:transparent}
.tag.flat{background:var(--amber-bg);color:var(--amber-d);border-color:transparent}
.tag.down{background:var(--red-bg);color:var(--red-d);border-color:transparent}

.plan-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.plan-cell{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px}
.plan-cell.entry{background:var(--green-bg);border-color:transparent}
.plan-cell.sl{background:var(--red-bg);border-color:transparent}
.plan-cell .l{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
.plan-cell.entry .l{color:var(--green-d)}
.plan-cell.sl .l{color:var(--red-d)}
.plan-cell .v{font-size:20px;font-weight:500;margin-top:3px}
.plan-cell.entry .v{color:#173404}
.plan-cell.sl .v{color:#501313}

.tp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.tp{background:var(--green-bg);padding:9px 12px;border-radius:8px}
.tp .l{font-size:10px;text-transform:uppercase;color:var(--green-d);letter-spacing:0.5px;font-weight:500}
.tp .v{font-size:16px;font-weight:500;color:#173404;margin-top:2px}
.tp .gain{font-size:10px;color:var(--green-d);margin-top:1px}

.chart-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.chart-wrap h4{margin:0 0 4px;font-size:13px;font-weight:500}
.chart-wrap .sub{font-size:11px;color:var(--muted);margin-bottom:10px}
.chart-box{position:relative;width:100%;height:160px}

.lvl-bar{position:relative;height:48px;margin:6px 0 14px}
.lvl-bar .track{position:absolute;left:0;right:0;top:22px;height:3px;background:var(--border);border-radius:2px}
.lvl-bar .marker{position:absolute;top:0}
.lvl-bar .marker .line{width:2px;height:24px;margin-left:4px}
.lvl-bar .marker .lbl{font-size:10px;font-weight:500;margin-top:2px}
.lvl-bar .marker .x{font-size:9px;color:var(--muted)}
@media (max-width:580px){.panel{padding:14px 16px}.panel-h h2{font-size:16px}.tab{padding:8px 10px;font-size:12px}.bullets li{flex-direction:column;gap:6px}.bullets .lbl{width:auto}}

.synthese{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:14px}
.synthese-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.synthese-h h4{margin:0;font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.synthese-pill{font-size:14px;font-weight:500;padding:6px 14px;border-radius:8px;letter-spacing:0.5px}
.synthese-pill.buy{background:var(--green-bg);color:var(--green-d)}
.synthese-pill.hold{background:var(--amber-bg);color:var(--amber-d)}
.synthese-pill.sell{background:var(--red-bg);color:var(--red-d)}
.synthese-score{font-size:11px;opacity:0.7;font-weight:400;margin-left:6px}
.factors{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.factor{padding:8px 10px;border-radius:8px;font-size:12px;background:var(--surface);border:0.5px solid var(--border)}
.factor.bull{background:#EAF3DE;border-color:transparent;color:#173404}
.factor.bear{background:#FCEBEB;border-color:transparent;color:#501313}
.factor.neutral{background:#F1EFE8;border-color:transparent;color:#444441}
.factor .nm{font-weight:500;font-size:11px;letter-spacing:0.3px;opacity:0.85}
.factor .v{font-size:13px;font-weight:500;margin-top:2px}
</style>
</head>

"PE 21 pour +20% de croissance EPS attendu = valorisation raisonnable vu la dynamique. Marge EBITDA 15%, ROE 28% (très haut grâce au levier opérationnel). Dette nette négative (Airbus a plus de cash que de dette). Dividende 0,3%, pas un titre de rendement.",
"Dépendance fournisseurs (CFM/Safran pour les moteurs LEAP, RTX pour les moteurs PW1100 sur A220). Si les approvisionnements se grippent, la cadence ralentit. Géopolitique Chine (taxes douanières en représailles si guerre commerciale).",
"Atteinte cadence 75/mois A320 (vérifiable trimestre par trimestre). Certification A321XLR aux USA (long-courrier économique). Contrats défense majeurs (FCAS franco-allemand-espagnol).",
"Le pari aérospatial européen. Cycle structurellement haussier sur 10 ans (besoin mondial de renouveler la flotte). Bon profil mid-term, pas de précipitation. Action française cotée à Paris, éligible PEA. Comparable : Safran (motoriste, encore mieux exposé à la cadence), Dassault Aviation (jets d'affaires)."
],
"SAF":[
"Pure-play aéronautique : moteurs CFM/LEAP (en partenariat 50/50 avec GE Aerospace, équipent les Airbus A320 et Boeing 737 MAX), équipements de bord (trains d'atterrissage, nacelles, sièges Zodiac), défense.",
"Bénéficiaire direct de la montée en cadence A320/737. Aftermarket (maintenance, réparation, pièces détachées) en explosion : les premiers moteurs LEAP livrés depuis 2016 entrent maintenant en cycle de maintenance (très rentable, marge 25%+). Cash-flow conversion >100%.",
"PE 38 = très tendu. Mais le marché price 10+ années de visibilité aftermarket comme une rente perpétuelle (chaque moteur LEAP génère plus de revenu en maintenance qu'à la vente initiale). Marge EBITDA 18% en hausse. ROE 22% excellent. Dividende 1,4% modeste.",
"Cyclicité aérienne (récession globale = annulations de commandes, mais le carnet protège). Problèmes durabilité du moteur LEAP-1A (rappels en série, coûts de garantie). Concurrence Pratt & Whitney sur narrow-body.",

"Le best-in-class de l'aéronautique européenne. Cher, mais un des rares compounders français de qualité industrielle. Profil long-terme. Risque principal : un crash de marché général affecterait fortement (beta élevé, c'est-à-dire que l'action amplifie les mouvements du marché). Comparable : Airbus (équipementier vs avionneur), MTU Aero (Allemagne)."
],
"HO":[
"Leader européen de l'électronique de défense (radars, missiles, sonars), avionique civile (équipements pour Airbus, Boeing, Embraer), identité numérique (passeports biométriques, cartes bancaires, SIM). 60% du chiffre d'affaires en défense, 30% en aéro civil.",
"Carnet de commandes défense en explosion (+15%/an) avec la guerre en Ukraine et les budgets NATO 2,5%. Aéro civil rebondit aussi post-Covid avec la reprise du trafic. Marges ROP +200 bps en restoration.",
"PE 18 = décote vs Lockheed Martin (22x) et RTX (20x) malgré une dynamique similaire. Re-rating en cours mais incomplet. Marge EBITDA 14%, ROE 21% solide. Dividende 1,4%.",
"Cyclicité contrats défense (politique : si l'Europe se désaligne sur la défense, les budgets pourraient stagner). Exposition à Naval Group (joint-venture État français sous tension après l'affaire australienne).",
"Budgets défense européens 2026 (NATO 2,5% comme objectif). Contrats SCAF (avion de combat futur franco-allemand). Capital markets day attendu Q4 avec nouveaux objectifs financiers.",
"Best French defense play. Profite directement du contexte géopolitique tendu. Bon profil 3-5 ans tant que les tensions persistent. Action française cotée à Paris, éligible PEA. Comparable : Dassault Aviation (Rafale, plus pure), Hensoldt (Allemagne, plus pure play défense)."
],
"STLA":[
"14 marques fusionnées en 2021 (Peugeot, Citroën, Fiat, Jeep, Chrysler, Dodge, Ram, Alfa Romeo, Maserati, Lancia, DS, Opel, Vauxhall, Abarth). Pari sur les synergies (8 Mds€ visés). Très exposé US (50% du CA via Jeep/Ram/Chrysler) et Europe.",

"PE 3 = pricing d'effondrement. Marge EBITDA 9% (vs 14% en 2023). Dette modérée (0,8x EBITDA) heureusement. Sans dividende, plus de yield support pour le cours, ce qui retire un plancher technique.",
"Plan de redressement crédible incertain (nouveau CEO à nommer). Perte continue de parts de marché US (Jeep, Chrysler, Dodge). Tarifs douaniers Trump = -10% de marge potentielle. Risque social Italie (grèves, rapport CGIL/FIOM tendu).",
"Annonce du nouveau CEO (catalyseur clé). Reset complet des attentes US lors de la prochaine publication. Lancement Citroën ë-C3 Africa (pari low-cost). Possible scission ou cession de marques (Maserati, Alfa Romeo).",
"Très spéculatif. À éviter pour un PEA défensif. Si vous croyez au redressement par un nouveau management, position max 2-3% du portefeuille. Risque additionnel de -30% à -50% est réel. Comparable : Volkswagen (turnaround similaire en cours), Renault (mieux géré et plus avancé dans le redressement)."
],
"RNO":[

"Cyclicité auto européenne (ralentissement conso). Nissan stake (15%, non stratégique mais oblige à des rachats croisés) pénalise la décote. Pricing EV sous pression Tesla/BYD. Risque Trump (taxes USA si export Europe).",
"Spin-off Ampere (filiale 100% EV) à l'étude (catalyseur potentiel +20%). Nouvelle Twingo électrique <€20k (printemps 2026, pari volume). Contrats production tiers (Geely, Volvo).",

],
"ML":[

"Pneus EV (croissance structurelle, +15%/an attendu). Nouveaux marchés mines (lithium, cuivre). Reset comptable Chine (sortie des gammes non rentables).",

],
"BN":[

function computeLevels(s){
  const p = s.price;
  if (s.signal === "buy") {
    s.support = p * 0.95; s.resistance = p * 1.06;
    s.entry = p * 1.005; s.sl = p * 0.93;
    s.tp1 = p * 1.09; s.tp2 = p * 1.16; s.tp3 = p * 1.25;
  } else if (s.signal === "sell") {
    s.support = p * 0.92; s.resistance = p * 1.04;
    s.entry = p * 1.04; s.sl = p * 1.10;
    s.tp1 = p * 0.91; s.tp2 = p * 0.84; s.tp3 = p * 0.77;
  } else {
    s.support = p * 0.94; s.resistance = p * 1.06;
    s.entry = p * 1.01; s.sl = p * 0.94;
    s.tp1 = p * 1.07; s.tp2 = p * 1.13; s.tp3 = p * 1.20;
  }
}
stocks.forEach(computeLevels);

function gen(seed, signal, base) {
  let r = seed * 9301 + 49297;
  function rnd(){ r = (r * 1103515245 + 12345) & 0x7fffffff; return (r / 0x7fffffff); }
  const N = 28;
  const prices = [], obv = [];
  let p = base * (signal==="buy" ? 1.06 : signal==="sell" ? 0.95 : 1.02);
  let o = 100;
  for (let i = 0; i < N; i++){
    let trend;
    if (signal==="buy") trend = i < N/2 ? -0.55 : 0.65;
    else if (signal==="sell") trend = i < N/2 ? 0.45 : -0.55;
    else trend = (rnd()-0.5) * 0.4;
    const noise = (rnd()-0.5) * 1.4;
    p = p * (1 + (trend + noise) / 100);
    prices.push(p);
    const dp = i > 0 ? prices[i] - prices[i-1] : 0;
    const vol = 0.7 + rnd()*0.7;
    o += (dp > 0 ? 1 : -1) * vol * 5.5;
    if (signal==="buy" && i >= Math.floor(N/2) && i <= Math.floor(N*0.7)) o = Math.max(o, 78);
    if (signal==="sell" && i >= Math.floor(N/2) && i <= Math.floor(N*0.7)) o = Math.min(o, 122);
    obv.push(o);
  }
  return { prices, obv };
}

function fmt(n, dec){ if(typeof n!=="number") return "—"; if(dec===undefined) dec = n<10?2:n<100?1:0; return n.toLocaleString("fr-FR",{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtPrice(p){ return fmt(p) + "€"; }
function fmtChange(c){ const sign = c>=0?"+":""; return sign + fmt(c,1) + "%"; }
function pctGain(target, entry){ return ((target/entry - 1) * 100); }

function logoEl(s){ return '<div class="logo" style="background:'+s.color+'">'+s.ticker+'</div>'; }

function sparkSvg(prices, signal){
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const W = 100, H = 32;
  const pts = prices.map((p, i) => {
    const x = (i / (prices.length-1)) * W;
    const y = H - ((p - min) / range) * (H - 4) - 2;
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  const color = signal==="buy" ? "#0F6E56" : signal==="sell" ? "#A32D2D" : "#888780";
  const fill = signal==="buy" ? "rgba(29,158,117,0.1)" : signal==="sell" ? "rgba(226,75,74,0.1)" : "rgba(150,150,150,0.08)";
  const fillPts = "0," + H + " " + pts + " " + W + "," + H;
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><polygon points="'+fillPts+'" fill="'+fill+'"/><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5"/></svg>';
}

function cardHtml(s){
  return '<div class="card" data-ticker="'+s.ticker+'">'
    + '<div class="card-h">' + logoEl(s)
    + '<div class="meta"><div class="nm">'+s.name+'</div><div class="sec">'+s.sector+'</div></div>'
    + '</div>'
    + '<div class="card-pr"><span class="p">'+fmtPrice(s.price)+'</span>'
    + '<span class="ch '+(s.change>=0?"up":"dn")+'">'+fmtChange(s.change)+'</span></div>'
    + sparkSvg(s.prices, s.signal)
    + '<div style="display:flex;align-items:center;justify-content:space-between">'
    +   '<span class="signal '+s.signal+'"><span class="dot '+s.signal+'"></span>'+SIGNAL_LABEL[s.signal]+'</span>'
    +   '<span class="signal-rsi">RSI '+s.rsi+'</span>'
    + '</div>'
    + '</div>';
}

function summary(filtered){
  const buy = filtered.filter(s=>s.signal==="buy").length;
  const hold = filtered.filter(s=>s.signal==="hold").length;
  const sell = filtered.filter(s=>s.signal==="sell").length;
  const avgChange = filtered.length ? filtered.reduce((a,s)=>a+s.change,0) / filtered.length : 0;
  return '<div class="tile"><div class="l">Valeurs</div><div class="v">'+filtered.length+'</div></div>'
    + '<div class="tile buy"><div class="l">Signal achat</div><div class="v">'+buy+'</div></div>'
    + '<div class="tile hold"><div class="l">Neutre</div><div class="v">'+hold+'</div></div>'
    + '<div class="tile sell"><div class="l">Signal vente</div><div class="v">'+sell+'</div></div>'
    + '<div class="tile"><div class="l">Variation moy.</div><div class="v '+(avgChange>=0?"up":"dn")+'" style="font-size:18px">'+fmtChange(avgChange)+'</div></div>';
}

function getFiltered(){
  const q = document.getElementById("search").value.toLowerCase().trim();
  const sec = document.getElementById("fSector").value;
  const sig = document.getElementById("fSignal").value;
  const sort = document.getElementById("fSort").value;
  let arr = stocks.filter(s => {
    if (q && !(s.ticker.toLowerCase().includes(q) || s.name.toLowerCase().includes(q))) return false;
    if (sec && s.sector !== sec) return false;
    if (sig && s.signal !== sig) return false;
    return true;
  });
  if (sort === "alpha") arr.sort((a,b)=>a.name.localeCompare(b.name));
  else if (sort === "rsi-desc") arr.sort((a,b)=>b.rsi-a.rsi);
  else if (sort === "rsi-asc") arr.sort((a,b)=>a.rsi-b.rsi);
  else if (sort === "ch-desc") arr.sort((a,b)=>b.change-a.change);
  else if (sort === "ch-asc") arr.sort((a,b)=>a.change-b.change);
  else if (sort === "mcap-desc") arr.sort((a,b)=>b.mcap-a.mcap);
  else { const order = {buy:0,hold:1,sell:2}; arr.sort((a,b)=>order[a.signal]-order[b.signal] || b.mcap-a.mcap); }
  return arr;
}

function render(){
  const arr = getFiltered();
  document.getElementById("summary").innerHTML = summary(arr);
  document.getElementById("grid").innerHTML = arr.map(cardHtml).join("");
  document.getElementById("hdrcount").textContent = arr.length + " / " + stocks.length + " valeurs";
  document.querySelectorAll(".card").forEach(c => {
    c.addEventListener("click", () => openDetail(c.dataset.ticker));
  });
}

let charts = [];
function destroyCharts(){ charts.forEach(c => c.destroy()); charts = []; }

function bulletsHtml(bullets){
  if (!bullets || bullets.length === 0) return "";
  return '<ul class="bullets">' + bullets.map((b, i) => {
    const cls = BULLET_CLASSES[i];
    const liCls = cls === "ret" ? ' class="ret"' : '';
    return '<li'+liCls+'><div class="lbl '+cls+'">'+BULLET_LABELS[i]+'</div><div class="txt">'+b+'</div></li>';
  }).join("") + '</ul>';
}


function syntheseHtml(s){
  try {
    if(!s || !s.factors || !Array.isArray(s.factors)) return '';
    var cls = s.cls || 'hold';
    var label = s.label || 'NEUTRE';
    var score = (typeof s.score === 'number') ? s.score : 0;
    var factorsHtml = s.factors.map(function(f){
      return '<div class="factor '+(f.status||'neutral')+'"><div class="nm">'+(f.name||'')+'</div><div class="v">'+(f.detail||'')+'</div></div>';
    }).join('');
    return '<div class="synthese">'
      + '<div class="synthese-h"><h4>Synthese multi-indicateurs</h4>'
      + '<span class="synthese-pill '+cls+'">'+label+'<span class="synthese-score">score '+(score>=0?'+':'')+score+'/4</span></span>'
      + '</div>'
      + '<div class="factors">'+factorsHtml+'</div>'
      + '</div>';
  } catch(e) { return ''; }
}

function detailHtml(s){
  const r1 = ((s.tp1 - s.entry) / Math.abs(s.entry - s.sl)).toFixed(1);
  const r2 = ((s.tp2 - s.entry) / Math.abs(s.entry - s.sl)).toFixed(1);
  const r3 = ((s.tp3 - s.entry) / Math.abs(s.entry - s.sl)).toFixed(1);
  const isShort = s.signal === "sell";
  const slPct = pctGain(s.sl, s.entry);
  return '<div class="panel-h">' + logoEl(s)
    + '<div><h2>'+s.name+'</h2><div class="sec">'+s.ticker+' · '+s.sector+'</div></div>'
    + '<div class="pr"><span class="p">'+fmtPrice(s.price)+'</span><span class="ch '+(s.change>=0?"up":"dn")+'">'+fmtChange(s.change)+'</span></div>'
    + '<button class="close" id="closeBtn" aria-label="Fermer">×</button>'
    + '</div>'
    + '<div class="tabs">'
    +   '<button class="tab active" data-tab="fund">Fondamentaux</button>'
    +   '<button class="tab" data-tab="tech">Technique &amp; OBV</button>'
    +   '<button class="tab" data-tab="plan">Plan de trading</button>'
    + '</div>'
    + '<div class="section active" data-section="fund">'
    +   '<div class="illus"><div class="icon-wrap" style="background:'+s.color+'15;color:'+s.color+'"><svg viewBox="0 0 24 24">'+ICONS[s.icon]+'</svg></div>'
    +     '<div class="txt"><div class="pn">'+s.product+'</div><div class="pd">Capi : '+fmt(s.mcap,0)+' Md€ · '+s.sector+'</div></div></div>'
    +   '<div class="kpi-grid">'
    +     '<div class="kpi"><div class="l">P/E</div><div class="v">'+fmt(s.pe,0)+'x</div></div>'
    +     '<div class="kpi"><div class="l">ROE</div><div class="v">'+fmt(s.roe,0)+'%</div></div>'
    +     '<div class="kpi"><div class="l">Marge EBITDA</div><div class="v">'+fmt(s.ebMargin,0)+'%</div></div>'
    +     '<div class="kpi"><div class="l">Dividende</div><div class="v">'+fmt(s.dy,1)+'%</div></div>'
    +     '<div class="kpi"><div class="l">Dette/EBITDA</div><div class="v">'+fmt(s.debt,1)+'x</div></div>'
    +     '<div class="kpi"><div class="l">Capi.</div><div class="v">'+fmt(s.mcap,0)+' Md€</div></div>'
    +   '</div>'
    +   bulletsHtml(s.bullets)
    + '</div>'
    + '<div class="section" data-section="tech">'
    +   syntheseHtml(s)
    +   '<div class="tech-tags">'
    +     '<span class="tag '+(s.rsi>70?"down":s.rsi<30?"up":"flat")+'"><span class="l">RSI</span> '+s.rsi+'</span>'
    +     '<span class="tag '+s.obvTrend+'">'+TREND_LABEL[s.obvTrend]+'</span>'
    +     '<span class="tag"><span class="l">Support</span> '+fmtPrice(s.support)+'</span>'
    +     '<span class="tag"><span class="l">Résistance</span> '+fmtPrice(s.resistance)+'</span>'
    +     '<span class="tag '+s.signal+'"><span class="dot '+s.signal+'"></span>'+SIGNAL_LABEL[s.signal]+'</span>'
    +   '</div>'
    +   levelBarHtml(s)
    +   '<div class="chart-wrap">'
    +     '<h4>Prix · 28 séances</h4><div class="sub">Historique réel 30 séances Stooq</div>'
    +     '<div class="chart-box"><canvas id="chartPrice" role="img" aria-label="Graphique de prix sur 28 séances avec niveaux clés">Évolution du prix sur 28 séances.</canvas></div>'
    +   '</div>'
    +   '<div class="chart-wrap">'
    +     '<h4>OBV · On-Balance Volume</h4><div class="sub">OBV calculé depuis volumes réels 30j Stooq</div>'
    +     '<div class="chart-box"><canvas id="chartObv" role="img" aria-label="Graphique OBV sur 28 séances">Évolution de l\'OBV sur 28 séances.</canvas></div>'
    +   '</div>'
    +   '<div class="note tech"><span class="lbl">Lecture technique</span>'+s.techNote+'</div>'
    +   '<div class="note tech"><span class="lbl">Strategie OBV</span>L\'OBV cumule les volumes : <strong>+volume si close monte vs J-1</strong>, <strong>-volume si baisse</strong>. Lecture : (1) prix monte ET OBV monte = confirmation haussiere. (2) prix fait un nouveau plus bas mais OBV refuse = divergence haussiere, accumulation discrete. (3) prix monte mais OBV plafonne = divergence baissiere, distribution. Ici l\'OBV est calcule depuis les volumes <strong>Yahoo Finance reels sur 30 seances</strong> (echelle normalisee 70-130).</div>'
    + '</div>'
    + '<div class="section" data-section="plan">'
    +   '<div class="plan-row">'
    +     '<div class="plan-cell entry"><div class="l">'+(isShort?"Entrée short":"Entrée long")+'</div><div class="v">'+fmtPrice(s.entry)+'</div></div>'
    +     '<div class="plan-cell sl"><div class="l">Stop loss</div><div class="v">'+fmtPrice(s.sl)+' <span style="font-size:11px;font-weight:400">('+fmt(slPct,1)+'%)</span></div></div>'
    +   '</div>'
    +   '<div class="tp-row">'
    +     '<div class="tp"><div class="l">TP1 · R '+r1+'</div><div class="v">'+fmtPrice(s.tp1)+'</div><div class="gain">'+fmtChange(pctGain(s.tp1,s.entry))+'</div></div>'
    +     '<div class="tp"><div class="l">TP2 · R '+r2+'</div><div class="v">'+fmtPrice(s.tp2)+'</div><div class="gain">'+fmtChange(pctGain(s.tp2,s.entry))+'</div></div>'
    +     '<div class="tp"><div class="l">TP3 · R '+r3+'</div><div class="v">'+fmtPrice(s.tp3)+'</div><div class="gain">'+fmtChange(pctGain(s.tp3,s.entry))+'</div></div>'
    +   '</div>'
    +   '<div class="note"><span class="lbl">Déclencheur OBV (à valider sur ton chart)</span>'+
        (s.signal==="buy"
          ? "Entrer dès que l'OBV fait un higher low pendant que le prix teste "+fmtPrice(s.support)+", OU casse son plus haut 20j avec le prix au-dessus de "+fmtPrice(s.resistance)+"."
          : s.signal==="sell"
          ? "Shorter dès que l'OBV fait un lower high sur tout rebond vers "+fmtPrice(s.resistance)+", OU casse son support en même temps que le prix sous "+fmtPrice(s.support)+"."
          : "Pas de signal franc. Attendre une divergence OBV claire ou une cassure de range avant toute prise de position.")
        +'</div>'
    +   '<div class="note tech"><span class="lbl">Invalidation</span>Sortir intégralement si l\'OBV invalide la thèse (lower low pour un long, higher high pour un short) ou si le stop '+fmtPrice(s.sl)+' est touché en clôture.</div>'
    +   '<div class="note warn"><span class="lbl">Niveaux calculés</span>Les niveaux d\'entrée, stop et TP sont calculés à partir du prix réel (28/04/26) avec une formule procédurale standard. Pour des niveaux affinés, croiser avec une analyse technique sur ton broker.</div>'
    + '</div>';
}

function levelBarHtml(s){
  const lvls = [{p:s.sl,c:"#A32D2D",lbl:"SL",x:fmtPrice(s.sl)},
                {p:s.support,c:"#888780",lbl:"S",x:fmtPrice(s.support)},
                {p:s.price,c:"#185FA5",lbl:"Spot",x:fmtPrice(s.price)},
                {p:s.resistance,c:"#854F0B",lbl:"R",x:fmtPrice(s.resistance)},
                {p:s.tp1,c:"#3B6D11",lbl:"TP1",x:fmtPrice(s.tp1)},
                {p:s.tp2,c:"#3B6D11",lbl:"TP2",x:fmtPrice(s.tp2)},
                {p:s.tp3,c:"#3B6D11",lbl:"TP3",x:fmtPrice(s.tp3)}];
  const min = Math.min(...lvls.map(l=>l.p)), max = Math.max(...lvls.map(l=>l.p));
  const range = max - min || 1;
  return '<div class="lvl-bar"><div class="track"></div>' + lvls.map(l => {
    const left = ((l.p - min) / range) * 92 + 2;
    return '<div class="marker" style="left:'+left.toFixed(1)+'%"><div class="line" style="background:'+l.c+'"></div><div class="lbl" style="color:'+l.c+'">'+l.lbl+'</div><div class="x">'+l.x+'</div></div>';
  }).join("") + '</div>';
}

function openDetail(ticker){
  const s = stocks.find(x => x.ticker === ticker);
  if (!s) return;
  destroyCharts();
  const panel = document.getElementById("panel");
  panel.innerHTML = detailHtml(s);
  document.getElementById("overlay").classList.add("open");
  panel.classList.add("open");
  panel.scrollTop = 0;
  document.getElementById("closeBtn").addEventListener("click", closeDetail);
  panel.querySelectorAll(".tab").forEach(t => t.addEventListener("click", e => {
    panel.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    panel.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
    e.target.classList.add("active");
    panel.querySelector('.section[data-section="'+e.target.dataset.tab+'"]').classList.add("active");
    if (e.target.dataset.tab === "tech") setTimeout(() => drawCharts(s), 30);
  }));
}
function closeDetail(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
  destroyCharts();
}
document.getElementById("overlay").addEventListener("click", closeDetail);

function drawCharts(s){
  destroyCharts();
  const labels = s.prices.map((_,i) => "J"+(i+1));
  const supportLine = s.prices.map(()=>s.support);
  const resistanceLine = s.prices.map(()=>s.resistance);
  const entryLine = s.prices.map(()=>s.entry);
  const slLine = s.prices.map(()=>s.sl);
  const priceColor = s.signal==="buy"?"#0F6E56":s.signal==="sell"?"#A32D2D":"#185FA5";
  const priceFill = s.signal==="buy"?"rgba(29,158,117,0.10)":s.signal==="sell"?"rgba(226,75,74,0.10)":"rgba(24,95,165,0.08)";
  const ctx1 = document.getElementById("chartPrice");
  if (ctx1) charts.push(new Chart(ctx1, {
    type:"line",
    data:{labels, datasets:[
      {label:"SL",data:slLine,borderColor:"#E24B4A",borderWidth:1,borderDash:[3,3],pointRadius:0,fill:false},
      {label:"Support",data:supportLine,borderColor:"#888780",borderWidth:1,borderDash:[2,3],pointRadius:0,fill:false},
      {label:"Résistance",data:resistanceLine,borderColor:"#BA7517",borderWidth:1,borderDash:[2,3],pointRadius:0,fill:false},
      {label:"Entrée",data:entryLine,borderColor:"#3B6D11",borderWidth:1,borderDash:[5,3],pointRadius:0,fill:false},
      {label:"Prix",data:s.prices.map(p=>Math.round(p*100)/100),borderColor:priceColor,backgroundColor:priceFill,borderWidth:2,pointRadius:0,fill:true,tension:0.25}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,
        callbacks:{label:(c)=>c.dataset.label==="Prix"?"Prix : "+fmt(c.parsed.y)+"€":null,filter:(it)=>it.dataset.label==="Prix"}}},
      scales:{y:{ticks:{font:{size:10},callback:(v)=>fmt(v)+"€"},grid:{color:"rgba(0,0,0,0.05)"}},
              x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:7},grid:{display:false}}}
    }
  }));
  const ctx2 = document.getElementById("chartObv");
  const obvColor = s.obvTrend==="up"?"#3B6D11":s.obvTrend==="down"?"#A32D2D":"#534AB7";
  const obvFill = s.obvTrend==="up"?"rgba(59,109,17,0.10)":s.obvTrend==="down"?"rgba(163,45,45,0.10)":"rgba(83,74,183,0.10)";
  if (ctx2) charts.push(new Chart(ctx2, {
    type:"line",
    data:{labels, datasets:[
      {label:"OBV",data:s.obv.map(v=>Math.round(v)),borderColor:obvColor,backgroundColor:obvFill,borderWidth:2,pointRadius:0,fill:true,tension:0.25}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,callbacks:{label:(c)=>"OBV : "+Math.round(c.parsed.y)}}},
      scales:{y:{ticks:{font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},
              x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:7},grid:{display:false}}}
    }
  }));
}

const sectors = [...new Set(stocks.map(s=>s.sector))].sort();
const fSec = document.getElementById("fSector");
fSec.innerHTML = '<option value="">Tous secteurs</option>' + sectors.map(s=>'<option value="'+s+'">'+s+'</option>').join("");
["search","fSector","fSignal","fSort"].forEach(id => document.getElementById(id).addEventListener("input", render));
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });
render();
</script>
